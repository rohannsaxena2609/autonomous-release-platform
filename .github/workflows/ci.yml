name: CI Publish and Deploy

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-publish:
    name: Build Test Publish and Update GitOps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build application and run tests
        run: ./mvnw clean package

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
     
      - name: Generate Trivy vulnerability report
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Block images with critical vulnerabilities
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          skip-setup-trivy: true

      - name: Upload Trivy report to GitHub Security
        if: ${{ always() && github.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-image

      - name: Update Kubernetes image tag
        if: github.event_name == 'push'
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          manifest = Path("k8s/app-deployment.yaml")
          image = (
              f"{os.environ['REGISTRY']}/"
              f"{os.environ['IMAGE_NAME']}:"
              f"{os.environ['GITHUB_SHA']}"
          )

          lines = manifest.read_text().splitlines()
          updated = False

          for index, line in enumerate(lines):
              stripped = line.lstrip()

              if (
                  stripped.startswith("image:")
                  and "autonomous-release-platform" in stripped
              ):
                  indentation = line[: len(line) - len(stripped)]
                  lines[index] = f"{indentation}image: {image}"
                  updated = True
                  break

          if not updated:
              raise SystemExit(
                  "Could not find the application image in "
                  "k8s/app-deployment.yaml"
              )

          manifest.write_text("\n".join(lines) + "\n")
          print(f"Updated Kubernetes image to: {image}")
          PY

      - name: Commit Kubernetes manifest
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/app-deployment.yaml

          if git diff --cached --quiet; then
            echo "Kubernetes manifest already contains this image."
          else
            git commit -m "chore: deploy image ${GITHUB_SHA}"
            git push
          fi