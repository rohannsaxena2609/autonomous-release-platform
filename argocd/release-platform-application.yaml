apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: autonomous-release-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rohannsaxena2609/autonomous-release-platform.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true