version: "3.9"

services:

  postgres:

    image: postgres:17

    container_name: postgres-db

    restart: always

    environment:

      POSTGRES_DB: release_platform_db

      POSTGRES_USER: rohansaxena

      POSTGRES_PASSWORD: postgres

    ports:

      - "5432:5432"

    volumes:

      - postgres-data:/var/lib/postgresql/data

  app:

    build: .

    container_name: release-platform-app

    ports:

      - "8080:8080"

    depends_on:

      - postgres

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/release_platform_db

      SPRING_DATASOURCE_USERNAME: rohansaxena

      SPRING_DATASOURCE_PASSWORD: postgres

volumes:

  postgres-data: