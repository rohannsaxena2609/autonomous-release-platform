apiVersion: apps/v1
kind: Deployment

metadata:
  name: grafana

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      securityContext:
        fsGroup: 472
        fsGroupChangePolicy: OnRootMismatch

      containers:
        - name: grafana
          image: grafana/grafana:latest

          ports:
            - containerPort: 3000

          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin

            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin

            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "500m"

      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc