spring.application.name=autonomous-release-platform

server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/release_platform_db
spring.datasource.username=rohansaxena
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=autonomous-release-platform
spring.jpa.open-in-view=false
management.endpoint.health.show-details=always

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

logging.level.org.springframework=INFO
logging.level.com.rohan=DEBUG