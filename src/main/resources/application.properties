spring.application.name=autonomous-release-platform

server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/release_platform_db
spring.datasource.username=rohansaxena
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

management.prometheus.metrics.export.enabled=true

management.metrics.tags.application=autonomous-release-platform

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

logging.level.org.springframework=INFO
logging.level.com.rohan=DEBUG